<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SalesCockpit SaaS</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/shell.css">
</head>
<body>

  <!-- Sidebar Navigation -->
  <aside id="sidebar">
    <div class="sb-brand">Sales<span style="color:var(--green)">Cockpit</span></div>
    <nav class="sb-nav">
      <div class="sbi active" id="sbi-builder" data-view="builder">
        <span>📋</span> <span data-de="Offer Builder" data-en="Offer Builder">Offer Builder</span>
      </div>
      <div class="sbi" id="sbi-leads" data-view="leads">
        <span>👥</span> <span data-de="Leads" data-en="Leads">Leads</span>
      </div>
      <div class="sbi" id="sbi-tasks" data-view="tasks">
        <span>✅</span> <span data-de="Aufgaben" data-en="Tasks">Aufgaben</span>
      </div>
      <div class="sbi" id="sbi-avail" data-view="avail">
        <span>📅</span> <span data-de="Verfügbarkeit" data-en="Availability">Verfügbarkeit</span>
      </div>
      
      <div style="margin-top:24px; padding:0 24px; font-size:10px; color:rgba(255,255,255,0.3); text-transform:uppercase; letter-spacing:1px; font-weight:700">Analytics</div>
      <div class="sbi" id="sbi-stats" data-view="stats">
        <span>📊</span> <span data-de="Statistik" data-en="Statistics">Statistik</span>
      </div>

      <div style="margin-top:24px; padding:0 24px; font-size:10px; color:rgba(255,255,255,0.3); text-transform:uppercase; letter-spacing:1px; font-weight:700">Settings</div>
      <div class="sbi" id="sbi-res" data-view="res">
        <span>📚</span> <span data-de="Ressourcen" data-en="Resources">Ressourcen</span>
      </div>
      <div class="sbi" id="sbi-auto" data-view="auto">
        <span>🤖</span> <span data-de="Automation" data-en="Automation">Automation</span>
      </div>
    </nav>
  </aside>

  <!-- Main Content -->
  <main id="main">
    <header id="header">
      <div style="display:flex; align-items:center; gap:24px">
        <div id="hd-cur" style="font-size:16px; font-weight:700; color:var(--navy); min-width:120px">Offer Builder</div>
        
        <div class="hd-search-wrap">
          <span class="hd-search-icon">🔍</span>
          <input type="text" class="hd-search-input" placeholder="Search leads..." id="shell-search">
        </div>
      </div>

      <div id="hd-actions" style="display:flex; gap:20px; align-items:center">
        <div id="notif-bell" style="cursor:pointer; font-size:18px; position:relative">
          🔔 <span style="position:absolute; top:-4px; right:-4px; width:14px; height:14px; background:var(--red); color:#fff; border-radius:50%; font-size:8px; display:flex; align-items:center; justify-content:center; font-weight:700">3</span>
        </div>
        
        <div style="display:flex; align-items:center; gap:10px; padding-left:20px; border-left:1px solid var(--bd)">
          <div style="text-align:right">
            <div id="user-email" style="font-size:12px; font-weight:700; color:var(--navy)">...</div>
            <div id="btn-logout" style="font-size:10px; color:var(--red); cursor:pointer; font-weight:600">Logout</div>
          </div>
          <div id="user-avatar" style="width:36px; height:36px; border-radius:50%; background:var(--green); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px">BK</div>
        </div>
      </div>
    </header>

    <div id="view-container" style="flex:1; display:flex; flex-direction:column; overflow:hidden">
      <div id="view-builder" class="view active"></div>
      <div id="view-leads" class="view"></div>
      <div id="view-tasks" class="view"></div>
      <div id="view-avail" class="view"></div>
      <div id="view-res" class="view"></div>
    </div>
  </main>

  <!-- Splash & Login (Modals) -->
  <div id="splash" class="splash">
    <div class="splash-logo">Sales<span style="color:var(--green)">Cockpit</span></div>
    <div class="splash-hint">Click to continue</div>
  </div>

  <div id="login-modal" class="modal-overlay" style="display:none">
    <div class="modal-card" style="width:320px; padding:32px">
      <h2 style="margin-bottom:8px">Login</h2>
      <p style="font-size:12px; color:var(--ink3); margin-bottom:24px">Geben Sie Ihre E-Mail ein, um einen Magic Link zu erhalten.</p>
      <input type="email" id="login-email" class="ef-input" placeholder="email@example.com" style="margin-bottom:12px">
      <button id="btn-login" class="btn-primary" style="width:100%">Magic Link senden</button>
      <div id="login-msg" style="margin-top:12px; font-size:11px; text-align:center; display:none"></div>
    </div>
  </div>

  <div id="toast"></div>

  <!-- Bootstrapping -->
  <script type="module">
    import * as state from './core/state.js';
    import * as router from './core/router.js';
    import * as loader from './core/loader.js';
    import * as supabase from './core/supabase.js';
    import { q, g } from './core/utils.js';
    import { CFG } from './data/config.js';
    import { TMPL_DEFAULT } from './data/templates.js';

    async function init() {
      // 0. Initialize state with defaults
      state.patch({
        biz: CFG.biz,
        prices: CFG.prices,
        priceList: CFG.priceList,
        pkgContents: CFG.pkgContents,
        templates: TMPL_DEFAULT,
        stages: CFG.stages
      });

      // 1. Splash logic
      g('splash').onclick = () => {
        g('splash').classList.add('gone');
        checkAuth();
      };

      // 2. Auth check
      async function checkAuth() {
        const user = await supabase.getUser();
        if (user) {
          state.set('user', user);
          state.set('isAuthenticated', true);
          g('user-email').textContent = user.email;
          bootApp();
        } else {
          g('login-modal').style.display = 'flex';
        }
      }

      // 3. Login/Logout logic
      g('btn-login').onclick = async () => {
        const email = g('login-email').value;
        try {
          await supabase.signInWithMagicLink(email);
          g('login-msg').textContent = 'Magic link gesendet! Bitte E-Mail prüfen.';
          g('login-msg').style.display = 'block';
        } catch (err) {
          alert('Error: ' + err.message);
        }
      };

      g('btn-logout').onclick = async () => {
        await supabase.signOut();
        location.reload();
      };

      // 4. App Boot
      async function bootApp() {
        g('login-modal').style.display = 'none';
        
        // Navigation handler
        async function handleNav(view) {
          router.navTo(view);
          
          // Update sidebar active state
          document.querySelectorAll('.sbi').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.view === view);
          });

          // Update header title
          const activeBtn = document.querySelector(`.sbi[data-view="${view}"]`);
          if (activeBtn) {
            const lang = state.get('lang') || 'de';
            const label = activeBtn.querySelector('span:last-child');
            g('hd-cur').textContent = label ? label.getAttribute('data-' + lang) || label.textContent : view;
          }

          const rootEl = g('view-' + view);
          if (rootEl) {
            // Hide all other views
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            rootEl.classList.add('active');

            // Load and mount module
            try {
              await loader.load(view, `./modules/${view}.js`);
              await loader.mount(view, rootEl, { state, router, loader, supabase, i18n, utils: { g, showErrorCard } });
            } catch (err) {
              showErrorCard(rootEl, view, err.message);
            }
          }
        }

        document.querySelectorAll('.sbi').forEach(btn => {
          btn.onclick = () => handleNav(btn.dataset.view);
        });

        // Load initial view
        handleNav('builder');
      }
    }

    init();
  </script>
</body>
</html>
